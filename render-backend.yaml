services:
  - type: web
    name: trilens-backend
    runtime: python
    runtimeVersion: 3.11
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120"
    
    # Environment variables (NO GOOGLE CLOUD NEEDED!)
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trilens-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false  # Add manually in Render dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false  # Add manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false  # Add manually in Render dashboard
      - key: TWILIO_PHONE_NUMBER
        sync: false  # Add manually in Render dashboard
      - key: TWILIO_WEBHOOK_BASE_URL
        value: "https://trilens-backend.onrender.com"  # Will be auto-generated
      - key: CORS_ORIGINS
        value: "https://trilens-frontend.onrender.com,http://localhost:3000"
    
    disk:
      - name: data
        mountPath: /var/data
        sizeGB: 1

databases:
  - name: trilens-db
    databaseName: trilens_db
    user: postgres
    region: us-east
    plan: standard
