# ── Render Blueprint — DemoVishwanova (Trilens) ───────────────
# Deploy: Push this file to GitHub, then in Render Dashboard →
#         New → Blueprint → Connect your repo
# ──────────────────────────────────────────────────────────────

services:
  # ── Backend: FastAPI Docker Web Service ──────────────────────
  - type: web
    name: trilens-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trilens-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://trilens-frontend.onrender.com
      - key: LLM_PROVIDER
        value: offline
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /health

  # ── Frontend: Static Site (no Docker needed) ────────────────
  - type: web
    name: trilens-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://trilens-backend.onrender.com
      - key: NODE_VERSION
        value: "18"

# ── PostgreSQL Database ───────────────────────────────────────
databases:
  - name: trilens-db
    plan: free
    databaseName: trilens
    user: trilens_user
    region: oregon
